name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff + black)
        run: |
          ruff check revops tests
          black --check revops tests
      - name: Tests (offline, no keys needed)
        run: pytest -q
